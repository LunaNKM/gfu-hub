name: Google Drive 동기화

on:
  # 매일 오전 7시 (한국시간 KST = UTC+9, GitHub Actions는 UTC 기준)
  schedule:
    - cron: '0 22 * * *'
  # 수동 실행 (GitHub Actions 탭에서 버튼 클릭)
  workflow_dispatch:
    inputs:
      force_resync:
        description: '전체 강제 재동기화 (변경 여부 무시하고 모든 파일 재처리)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      start_from_index:
        description: '재개할 파일 인덱스 (0-based). 예: 388번까지 완료 후 중단됐으면 388 입력'
        required: false
        default: '0'
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 650개 파일 × ~10s = ~108분, 여유있게 6시간으로 상향

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Drive 동기화 실행
        run: node scripts/drive-sync.mjs
        env:
          FORCE_RESYNC: ${{ github.event.inputs.force_resync || 'false' }}
          START_FROM_INDEX: ${{ github.event.inputs.start_from_index || '0' }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
